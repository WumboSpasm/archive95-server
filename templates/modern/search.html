<form action="/" method="get">
	<div class="archive95-search-upper">
		<a href="/" title="Go home"><img src="/images/modern/logo.gif"></a>
		<div class="archive95-search-box">
			<input type="text" id="query" name="query" value="{QUERY}" placeholder="Search {TOTAL} archived web pages and media...">
			<button type="submit">Search</button>
		</div>
	</div>
	<div class="archive95-search-lower">
		<div class="archive95-search-options">
			<fieldset>
				<legend>Search in</legend>
				<input type="checkbox" id="inTitle" name="in" value="title"{INTITLE}>
				<label for="inTitle">Title</label>
				<br>
				<input type="checkbox" id="inContent" name="in" value="content"{INCONTENT}>
				<label for="inContent">Content</label>
				<br>
				<input type="checkbox" id="inUrl" name="in" value="url"{INURL}>
				<label for="inUrl">URL</label>
			</fieldset>
			<fieldset>
				<legend>Search formats</legend>
				<input type="radio" id="formatsAll" name="formats" value="all"{FORMATSALL}>
				<label for="formatsAll">All formats</label>
				<br>
				<input type="radio" id="formatsText" name="formats" value="text"{FORMATSTEXT}>
				<label for="formatsText">Text only</label>
				<br>
				<input type="radio" id="formatsMedia" name="formats" value="media"{FORMATSMEDIA}>
				<label for="formatsMedia">Media only</label>
			</fieldset>
			<fieldset>
				<legend>Search source</legend>
				<select id="source" name="source">
					<option value="">All sources</option>
					{SOURCES}
				</select>
			</fieldset>
			<div>
				<a href="/random"><img src="/images/modern/dice.gif" title="Take me to a random page"></a>
			</div>
		</div>
		<div class="archive95-search-content">
			<fieldset>
				<legend>{HEADER}</legend>
				{CONTENT}
			</fieldset>
			{HIGHLIGHTS}
		</div>
	</div>
</form>
